      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.Shelter'
            type: array
      summary: Получить все приюты
      tags:
      - shelters
    post:
      consumes:
      - application/json
      parameters:
      - description: данные приюта
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.CreateShelterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
