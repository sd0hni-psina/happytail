          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Назначить роль пользователю
      tags:
      - Roles
  /roles/{id}:
    delete:
      description: Удаляет роль по ID
      parameters:
      - description: ID роли
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid id
          schema:
            type: string
        "500":
          description: Failed to remove role
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Удалить роль
      tags:
      - Roles
  /shelters:
