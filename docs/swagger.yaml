host: localhost:8080
info:
  contact: {}
  description: Backend API для платформы по усыновлению домашних животных.
  title: Happytail API
  version: "1.0"
paths:
  /adoptions:
    post:
      consumes:
      - application/json
      parameters:
      - description: данные заявки
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.CreateAdoptionInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.Adoption'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Создать заявку на усыновление
      tags:
      - adoptions
  /animals:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.Animal'
            type: array
      summary: Получить всех животных
      tags:
      - animals
    post:
      consumes:
      - application/json
      parameters:
      - description: данные животного
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.CreateAnimalInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.Animal'
      security:
      - ApiKeyAuth: []
      summary: Создать животное
      tags:
      - animals
  /animals/{id}:
    delete:
      description: Удаляет животное по ID (soft delete)
      parameters:
      - description: ID животного
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Успешно удалено
        "400":
          description: invalid animal ID
          schema:
            type: string
        "404":
          description: Animal not found
          schema:
            type: string
        "500":
          description: Failed to delete animal
          schema:
            type: string
      summary: Удалить животное
      tags:
      - animals
    get:
      consumes:
      - application/json
      parameters:
      - description: ID животного
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.Animal'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получить животное по ID
      tags:
      - animals
    put:
      consumes:
      - application/json
      description: Update existing animal by ID
      parameters:
      - description: Animal ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update animal input
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.UpdateAnimalInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.Animal'
        "400":
          description: Invalid input or invalid ID
          schema:
            type: string
        "404":
          description: Animal not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Update animal
      tags:
      - animals
  /animals/{id}/photos:
    get:
      description: Возвращает список фото для конкретного животного (главное фото
        первым)
      parameters:
      - description: ID животного
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.AnimalPhoto'
            type: array
        "400":
          description: Invalid id
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
        "500":
          description: Failed to fetch photos
          schema:
            type: string
      summary: Получить все фото животного
      tags:
      - AnimalPhotos
    post:
      consumes:
      - application/json
      description: Добавляет новое фото для конкретного животного
      parameters:
      - description: ID животного
        in: path
        name: id
        required: true
        type: integer
      - description: данные фото
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.AnimalPhotoInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.AnimalPhoto'
        "400":
          description: Invalid input
          schema:
            type: string
        "500":
          description: Failed to add photo
          schema:
            type: string
      summary: Добавить фото животного
      tags:
      - AnimalPhotos
  /animals/{id}/photos/{photo_id}/main:
    patch:
      description: Устанавливает фото как главное для животного
      parameters:
      - description: ID животного
        in: path
        name: id
        required: true
        type: integer
      - description: ID фото
        in: path
        name: photo_id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid id
          schema:
            type: string
        "404":
          description: Photo not available
          schema:
            type: string
        "500":
          description: Internal error
          schema:
            type: string
      summary: Сделать фото главным
      tags:
      - AnimalPhotos
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: логин и пароль
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Логин пользователя
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: refresh token
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.RefreshInput'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - ApiKeyAuth: []
      summary: Выход из системы
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: refresh token
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.RefreshInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Обновить access token
      tags:
      - auth
  /photos/{photo_id}:
    delete:
      description: Удаляет фото по ID
      parameters:
      - description: ID фото
        in: path
        name: photo_id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid id
          schema:
            type: string
        "500":
          description: Failed to delete photo
          schema:
            type: string
      summary: Удалить фото
      tags:
      - AnimalPhotos
  /posts:
    get:
      description: Возвращает список всех постов
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.Post'
            type: array
        "500":
          description: Failed to fetch posts
          schema:
            type: string
      summary: Получить все посты
      tags:
      - Post
    post:
      consumes:
      - application/json
      description: Создаёт новый пост
      parameters:
      - description: данные поста
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.CreatePostInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.Post'
        "400":
          description: Invalid input
          schema:
            type: string
        "409":
          description: Conflict
          schema:
            type: string
        "500":
          description: Failed to create post
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Создать пост
      tags:
      - Post
  /posts/{id}:
    get:
      description: Возвращает один пост по его ID
      parameters:
      - description: ID поста
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.Post'
        "400":
          description: Invalid post ID
          schema:
            type: string
        "404":
          description: Post not found
          schema:
            type: string
        "500":
          description: Failed to fetch post
          schema:
            type: string
      summary: Получить пост по ID
      tags:
      - Post
  /posts/{id}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: ID поста
        in: path
        name: id
        required: true
        type: integer
      - description: новый статус
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_sd0hni-psina_happytail_internal_models.UpdatePostStatusInput'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Обновить статус поста
      tags:
      - posts
  /roles:
    post:
      consumes:
      - application/json
      description: Назначает роль пользователю (например admin, moderator)
      parameters:
      - description: данные для назначения роли
        in: body
        name: input
        required: true
        schema:
